# spark/conf/log4j.properties
# ลด Spark internal logs ให้เหลือแค่ WARN/ERROR
# app log (loguru) ไม่ได้รับผลกระทบ เพราะ loguru เขียนตรง stdout แยกจาก log4j

log4j.rootCategory=WARN, console
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

# Spark core — เหลือแค่ ERROR
log4j.logger.org.apache.spark=ERROR
log4j.logger.org.apache.spark.SparkContext=WARN
log4j.logger.org.apache.spark.executor=WARN

# Hadoop/HDFS — เหลือแค่ WARN
log4j.logger.org.apache.hadoop=WARN
log4j.logger.BlockStateChange=ERROR

# Hive — เหลือแค่ WARN
log4j.logger.org.apache.hive=WARN
log4j.logger.DataNucleus=ERROR
log4j.logger.Datastore=ERROR
log4j.logger.Datastore.Schema=ERROR
log4j.logger.JPOX.Datastore=ERROR
log4j.logger.JPOX.Query=ERROR

# Parquet — เหลือแค่ ERROR
log4j.logger.org.apache.parquet=ERROR
log4j.logger.parquet=ERROR

# Jetty (Spark UI) — ปิดหมด
log4j.logger.org.eclipse.jetty=ERROR
log4j.logger.org.spark_project.jetty=ERROR